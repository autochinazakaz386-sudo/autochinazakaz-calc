<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AutoChinaZakaz</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { --bg: #0b1220; --line: rgba(255,255,255,.10); --text: #f8fafc; --gold: #f59e0b; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: sans-serif; background: #09101b; color: var(--text); padding: 12px; }
    .card { background: #111827; border: 1px solid var(--line); border-radius: 18px; padding: 16px; margin-bottom: 12px; }
    label { display: block; margin-bottom: 6px; font-size: 12px; color: #a9b5cc; }
    input, select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--line); background: #070c16; color: #fff; font-size: 14px; margin-bottom: 12px; appearance: none; }
    .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: linear-gradient(180deg, #f59e0b 0%, #d97706 100%); color: #fff; font-weight: bold; font-size: 16px; cursor: pointer; }
    .total-box { text-align: center; border: 1px dashed var(--gold); padding: 20px; border-radius: 15px; }
    .total-price { font-size: 32px; font-weight: 900; color: var(--gold); }
    .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="card">
    <label>Марка</label><select id="carBrand"></select>
    <label>Модель</label><select id="carModel"></select>
    <label>Год выпуска</label><input type="number" id="releaseYear" value="2023">
    <label>Тип двигателя</label>
    <select id="powertrainType">
      <option value="gasoline">Бензин</option>
      <option value="electric">Электро (BEV)</option>
      <option value="seriesHybrid">Посл. Гибрид</option>
    </select>
    <label>Объем ДВС, см³</label><input type="number" id="engineCc" value="1998">
    <label>Цена авто</label><input type="number" id="purchasePrice" value="150000">
    <label>Валюта</label>
    <select id="purchaseCurrency"><option value="CNY">Юань (CNY)</option><option value="USD">Доллар (USD)</option></select>
  </div>

  <div class="card total-box">
    <div class="total-price" id="totalRub">0 ₽</div>
    <div id="breakdown" style="margin: 15px 0;"></div>
    <button class="btn" id="sendData">Отправить расчет менеджеру</button>
  </div>

  <script>
    const carDatabase = { "Geely": ["Monjaro", "Tugella"], "Zeekr": ["001", "X"], "Li Auto": ["L7", "L9"] };
    const state = { rates: { CNY: 13.5, USD: 98, EUR: 108 } };
    const tg = window.Telegram.WebApp;
    tg.expand();

    function init() {
      const bSel = document.getElementById('carBrand');
      const mSel = document.getElementById('carModel');
      bSel.innerHTML = Object.keys(carDatabase).map(b => `<option value="${b}">${b}</option>`).join('');
      const updateM = () => {
        mSel.innerHTML = carDatabase[bSel.value].map(m => `<option value="${m}">${m}</option>`).join('');
        calculate();
      };
      bSel.onchange = updateM;
      document.querySelectorAll('input, select').forEach(el => el.oninput = calculate);
      updateM();
    }

    function calculate() {
      const price = parseFloat(document.getElementById('purchasePrice').value) || 0;
      const cur = document.getElementById('purchaseCurrency').value;
      const priceRub = price * (state.rates[cur] || 1);
      const total = priceRub + 450000; // Упрощенно для теста
      document.getElementById('totalRub').innerText = Math.round(total).toLocaleString() + ' ₽';
      document.getElementById('breakdown').innerHTML = `<div class="row"><span>Цена в ₽</span><span>${Math.round(priceRub).toLocaleString()} ₽</span></div>`;
    }

    document.getElementById('sendData').onclick = () => {
      const data = {
        car_name: document.getElementById('carBrand').value + ' ' + document.getElementById('carModel').value,
        total_price: document.getElementById('totalRub').innerText
      };
      if (tg.sendData) {
        tg.sendData(JSON.stringify(data));
      } else {
        alert("Ошибка: Отправка данных работает только если запустить калькулятор через кнопку внизу чата!");
      }
    };
    init();
  </script>
</body>
</html>
